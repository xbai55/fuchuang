photo_types:
  - title: 虚假投资收益截图
    subtype: fake_investment_dashboard
    description: >
      常见于荐股群、黄金外汇、数字货币、虚假理财平台。图片通常展示稳定盈利曲线、
      高额日收益、导师带单战绩或后台账户暴涨数字，用于诱导继续充值或加仓。
    risk_signals:
      - 短期暴利
      - 带单老师
      - 保本高收益
      - 链接开户
      - 群内统一晒单
    tags:
      - 投资诈骗
      - 荐股引流
      - 高收益
      - 虚假平台

  - title: 招聘培训缴费海报
    subtype: fake_job_training_poster
    description: >
      常见于兼职接单、配音、副业、电商代运营等场景。图中常出现"零基础""先学后赚"
      "培训包就业""轻松月入过万"等承诺，并引导先交培训费或开通分期。
    risk_signals:
      - 先培训后接单
      - 零门槛高薪
      - 兼职返现
      - 培训贷
    tags:
      - 求职诈骗
      - 培训诈骗
      - 兼职骗局

  - title: 假冒客服退款截图
    subtype: fake_customer_service_refund
    description: >
      常见于电商退款、物流理赔、机票改签、会员退费。图片或聊天截图中经常出现退款二维码、
      客服工号、赔付链接、下载会议软件或屏幕共享提示。
    risk_signals:
      - 退款链接
      - 扫码退费
      - 远程协助
      - 共享屏幕
      - 验证资金
    tags:
      - 冒充客服诈骗
      - 退款诈骗
      - 屏幕共享

  - title: 公检法文书与冻结通知
    subtype: fake_police_notice
    description: >
      常见于冒充公安、检察院、法院的场景。图中可能出现带有国徽、执法证、拘捕令、
      资金冻结通知书等元素，用于制造紧迫感并逼迫转账到所谓安全账户。
    risk_signals:
      - 资金冻结
      - 安全账户
      - 通缉令
      - 拘捕令
      - 国徽公文
    tags:
      - 公检法诈骗
      - 安全账户
      - 恐吓施压

  - title: AI拟声亲友求助线索
    subtype: ai_voice_family_urgency
    description: >
      常见于冒充亲友、子女、孙辈紧急求助。图片可能是家属聊天截图、医院抢救照片、
      交通事故图或转账求助界面，配合语音合成制造真实感。
    risk_signals:
      - 紧急借钱
      - 医院事故
      - 当面取现
      - AI换音
    tags:
      - AI拟声诈骗
      - 亲友冒充
      - 紧急求助

  - title: 伪造转账凭证与到账截图
    subtype: fake_transfer_receipt
    description: >
      常见于二手交易、代购、租房、兼职代付等场景。图像多为银行转账截图、付款成功页、
      待到账提示页，用于拖延发货、骗取押金或诱导继续转款。
    risk_signals:
      - 延迟到账
      - 已付款待审核
      - 先发货后到账
      - 银行回执截图
    tags:
      - 交易诈骗
      - 伪造凭证
      - 转账截图

  - title: 二维码收款与陌生安装页
    subtype: suspicious_qr_install
    description: >
      常见于扫码领奖、下载反诈软件山寨版、安装理财 App、会议软件远控插件等场景。
      画面通常带有二维码、下载链接、安装授权页或"关闭手机防护"提示。
    risk_signals:
      - 扫码下载
      - 非官方安装包
      - 关闭风控
      - 授予辅助功能
    tags:
      - 二维码诈骗
      - 木马安装
      - 远程控制

  - title: 两卡买卖与跑分宣传图
    subtype: bank_card_running_score
    description: >
      常见于"提供银行卡即可赚钱""代收代付兼职""跑分日结"等图片或聊天招募内容。
      这类素材通常与帮助信息网络犯罪活动、掩饰隐瞒犯罪所得等关联犯罪高度相关。
    risk_signals:
      - 出租银行卡
      - 跑分兼职
      - 代收代付
      - 日结高佣
    tags:
      - 两卡犯罪
      - 跑分洗钱
      - 帮信罪
