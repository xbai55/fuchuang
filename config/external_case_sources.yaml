# External fraud-case sync configuration.
# Runtime must depend on public web sources and generated knowledge artifacts only.
# Do not point this file at local reference folders such as:
# - anti-fraud manuals
# - locally crawled fraud-case examples

enabled: true

# Sync interval in seconds. Can be overridden by EXTERNAL_CASE_SYNC_INTERVAL_SECONDS.
interval_seconds: 300

# Minimum cleaned body length. Short pages are ignored after parsing.
min_content_length: 80

# Deduplication state. Keep it under the generated knowledge artifact tree.
state_file: config/data/knowledge/import_reports/external_case_sync_state.json

# Cap fingerprint history so the state file cannot grow without bound.
max_seen_fingerprints: 50000

sources:
  - name: baidu_anti_fraud_classroom
    enabled: true
    type: url
    url: https://110.baidu.com/fqz/classroom
    category: case
    subtype: internet_fraud_case
    tags:
      - external_sync
      - official_reference
      - baidu_anti_fraud

