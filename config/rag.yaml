# RAG 知识库配置
# 用于诈骗识别知识库的构建和检索

# 数据路径配置
paths:
  raw_documents: data/knowledge/raw/documents.jsonl
  processed_documents: data/knowledge/processed/documents.jsonl
  chunks: data/knowledge/processed/chunks.jsonl
  index_dir: data/knowledge/index

# 索引配置
index:
  backend: tfidf  # 选项: tfidf, sentence-transformer, hybrid
  dense_model: BAAI/bge-base-zh-v1.5  # 仅 sentence-transformer 模式使用
  chunk_size: 420
  chunk_overlap: 80
  top_k: 6

# 风险预警阈值配置
warning:
  high_threshold: 0.32    # 高风险阈值
  medium_threshold: 0.18  # 中风险阈值

# 照片类型种子文件
photo_types_seed_file: config/photo_types.seed.yaml

# 数据源配置
sources:
  # 种子 URL - 固定的高质量文档
  seed_urls:
    # 法律条文
    - url: http://www.npc.gov.cn/npc/c2/c30834/202209/t20220902_319186.html
      category: law
      subtype: anti_telecom_fraud_law
      tags: [法律条文, 反电信网络诈骗法]

    - url: http://www.npc.gov.cn/npc/c2/c10134/201905/t20190521_255970.html
      category: law
      subtype: fraud_article_266_interpretation
      tags: [法律解释, 刑法, 诈骗罪, 第二百六十六条]

    - url: https://www.court.gov.cn/fabu/xiangqing/439341.html
      category: law
      subtype: cross_border_judicial_opinion
      tags: [司法意见, 跨境电诈, 法律适用]

    # 典型案例
    - url: https://www.court.gov.cn/zixun/xiangqing/490051.html
      category: case
      subtype: telecom_fraud_cases
      tags: [典型案例, 电信网络诈骗]

    - url: https://www.court.gov.cn/zixun/xiangqing/482861.html
      category: case
      subtype: livelihood_fraud_cases
      tags: [典型案例, 涉民生诈骗]

    - url: https://www.court.gov.cn/zixun/xiangqing/439351.html
      category: case
      subtype: cross_border_fraud_cases
      tags: [典型案例, 跨境电诈]

  # 中国人大网搜索配置
  npc:
    enabled: true
    search_terms:
      - 反电信网络诈骗法
      - 刑法 第二百六十六条
      - 诈骗罪
    title_include:
      - 反电信网络诈骗法
      - 第二百六十六条
      - 诈骗罪
    page_size: 30
    position: 0

  # 最高人民法院搜索配置
  court:
    enabled: true
    search_terms:
      - 电信网络诈骗 典型案例
      - 诈骗
    title_include:
      - 典型案例
      - 诈骗案
      - 入库参考案例
      - 法律若干问题的意见
    max_pages_per_query: 2
    page_size: 10

  # 中国政府网图片搜索配置
  gov_images:
    enabled: true
    search_terms:
      - 电信网络诈骗
      - 反诈
    title_include:
      - 诈骗
      - 反诈
      - 电信
    page_size: 10
