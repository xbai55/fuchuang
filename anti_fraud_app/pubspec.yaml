name: anti_fraud_app
description: AI反诈助手 - 移动端应用

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # 网络请求
  dio: ^5.4.0
  retrofit: ^4.0.3

  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # 图片处理
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  flutter_image_compress: ^2.1.0
  video_compress: ^3.1.2
  cached_network_image: ^3.3.1

  # UI 组件
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9

  # 工具
  intl: ^0.19.0
  permission_handler: ^11.2.0
  device_info_plus: ^9.1.2
  package_info_plus: ^5.0.1

  # JSON 序列化
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  # 代码生成
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  retrofit_generator: ^8.0.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/

  # 字体配置
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/custom_font.ttf
